body:
  text: 翰林志唐李肇撰昔宋昌有言曰所言公公言之所言私王者無私夫翰林為樞機宥密之地有所慎者事之微也若制置任用則非王者之私漢制尚書郎主作文書起草更直於建禮門内臺給青縑白綾或以錦被帷帳氊褥畫通中枕大官供食湯官供餅餌五熟果五日一美食下天子一等建禮門内得神仙門神仙門内得光明殿神仙殿自門下省中書省蓋比今翰林之制略同而所掌輕也漢武帝時嚴助朱買臣吾丘壽王司馬相如東方朔枚臯之徒皆在左右是時朝廷多事中外論難大臣數詘亦其事也唐興太宗始於秦王府開文學館擢房𤣥齡杜如晦一十八人皆以本官兼學士給五品珍膳分為三番更直宿於閣下討論墳典時人謂之登瀛洲貞觀初置𢎞文館學士聴朝之隙引之大内殿講論文義商較時政或夜分而罷至𤣥宗置麗正殿學士名儒大臣皆在其中後改為集賢殿亦草書詔至翰林置學士集賢書詔乃罷初國朝修陳故事有中書舍人六員專掌詔誥雖曰禁省猶非密切故溫大雅魏徴李百藥岑文本褚遂良許敬宗上官儀時召草制未有名號乾封已後始曰北門學士劉懿之劉禕之周思茂元萬頃范履氷為之則天朝蘇味道韋承慶其後上官昭容獨掌其事睿宗則薛稷賈膺福崔湜𤣥宗改為翰林待詔張説陸堅張九齡徐安貞相繼為之改為翰林供奉開元二十六年劉光謙張垍乃為學士始别建學士院于翰林院之南又有韓翃閻伯璵孟匡朝陳兼李白蔣鎮在舊翰林院雖有其名不職其事至徳宗已後翰林始兼學士之名代宗初李泌為學士而今壁記不列名氏蓋以不職事之故也按六典中書掌詔㫖制敇璽書册命皆案典故起草進書其禁有四一曰漏洩二曰稽緩三曰遺失四曰忘誤所以重王命也制敇既行有誤則奏而正之凡王言之制有七一曰册書立后建嫡封樹藩屏寵命尊賢臨軒備禮則用之二曰制書行大典賞罰授大官爵釐革舊政赦宥降虜則用之三曰慰勞制書褒賛賢能勸勉遣勞則用之四曰發白敇增減官員廢置州縣徵兵發馬除免官爵授六品已下官處流已上罪並用之五曰敇㫖為百司承㫖而為程式奏事請施行者六曰論事敇書慰諭公卿誡約臣下則用之七曰敇牒隨事承㫖不易舊典則用之又答疏於王公則用皇帝行寳勞來勲賢則用皇帝之寳徵召下臣則用皇帝信寳答四夷書則用天子行寳撫慰蠻夷則用天子之寳發蕃國兵則用天子信寳並甲令之定制也近朝大事直出中禁不由兩省不用六寳並從權也元和初置書詔印學士院主之凡赦書徳音立后建儲大誅討免三公宰相命將曰制並用白麻紙不用印雙日起草候閣門鑰入而後進書隻日百寮立班於宣政殿樞密使引案自東上閣門出若謫宰相則付通事舍人矩步而宣之機務要速亦用雙日甚者雖休暇追朝而出之凡賜與徵召宣索處分曰詔用白藤紙凡慰軍旅用黄麻紙並印凡批答表疏不用印凡太清宫道觀薦告詞文用青藤紙朱字謂之青詞凡諸陵薦告上表内道觀嘆道文並用白麻紙雜詞祭文禁軍號並進本凡將相告身用金花五色綾紙所司印凡吐蕃贊普書及别録用金花五色綾紙上白檀香木真珠瑟瑟鈿函銀鏁回紇可汗新羅渤海王書及别録並用金花五色綾紙次白檀香木瑟瑟鈿函銀鏁諸蕃軍長吐蕃宰相回紇内外宰相摩尼已下書及别録並用五色麻紙紫檀香木鈿函銀鏁並不用印南詔及大將軍清平官書用黄麻紙出付中書奉行却送院封函與回紇同凡畫而不行者藏之函而不用者納之凡參議奏論撰述註釋無定名奏復無晝夜凡徵天下草澤之士臨軒策試則議科設問覆定與奪凡受宣有堂厯日記有承㫖簿記大抵四者之禁無殊而漏洩之禁為急天寳十二載安禄山來朝𤣥宗欲加同中書門下平章事命張垍草制不行及其去也怏怏滋甚楊國忠曰此垍告之也遂貶盧溪郡司馬兄均建安郡太守弟埱宜春郡司馬徳宗雅尚文學注意是選乘輿每幸學士院顧問錫賚無所不至御饌珍肴輟而賜之又嘗召對於玉堂移院於金鑾殿對御起草詩賦倡和或旬日不出吳通微昆季同時擢用與陸䞇爭恩不叶甚于水火天下醜之貞元三年䞇上疏曰伏詳令式及國朝典故凡有詔令合由於中書如或墨制施行所司不須承受蓋所以示王者無私之義為國家不易之規貞觀中有學士一十八人太宗聴朝之餘但與講論墳籍時務得失悉不相干實録之中具載其事𤣥宗末方置翰林張垍因縁國親特承寵遇當時之議以為非宜然止於倡和文章批答表疏其於樞密輒不預知肅宗在靈武鳳翔事多草創權宜濟急遂破舊章翰林之中始掌書詔因循未革以至于今嵗月滋深漸逾職分頃者物議尤所不平皆云學士是天子私人侵敗綱紀致使聖代虧至公之體宰臣有備位之名陛下若俯順人情大革前弊凡在詔敇悉歸中書逺近聞之必稱至當若未能變改且欲因循則學士年月較深稍稍替換一者謗議不積二者氣力不衰君臣之間庶全終始事闗國體不合不言疏奏不納雖徵據錯謬然識者以為知言貞元末其任益重時人謂之内相而上多疑忌動必拘防有官守十三考而不遷故當時言内職者多榮滯相半及順宗不豫儲位未立王叔文起于非類竊學士之名内連牛美人李忠言外結姦黨取兵權弄神器天下震駭是時鄭絪為内庭之老首定大計今上即位授絪中書侍郎平章事初姜公輔行在命相乃就第而拜之至李吉甫除中書侍郎平章事適與裴垍同直垍草吉甫制吉甫草武元衡制垂簾揮翰兩不相知至暮吉甫有嘆惋之聲垍終不言書麻尾之後乃相慶賀禮絶之敬生於座中及明院中使學士送至銀臺門而相府官吏候于門外禁署之盛未之有也凡學士無定員皆以他官充下自校書郎上及諸曹尚書皆為之所入與班行絶跡不拘本司不繫朝謁常叅官二周為滿嵗則遷知制誥一周嵗為遷官則奏就本司判記上月日北省官宰相送南省官給舍丞郎送上興元元年敇翰林學士朝服序班宜准諸司官知制誥例凡初遷者中書門下召令右銀臺門候㫖其日入院試制書答共三首詩一首自張仲素後加賦一首試畢封進可者翌日受宣乃定事下中書門下於麟徳殿候對本院賜宴營幕使宿設帳幕圖褥尚食供饌酒坊使供美酒是為勑設序立拜恩訖候就宴又賜衣一副絹三十匹飛龍司借馬一匹旬日又進文一軸内庫給青綺錦被青綺方褡青綾單帕漆通中枕銅鏡漆奩象箆大小象梳漆箱銅挲羅銅觜椀紫絲履白布手巾畫木架牀鑪銅案席氊褥之類畢備内諸司供膳飲之物主膳四人掌之内園官一戸三人以供使令其所乘馬送迎於擗仗門内横門之西度支月給手力資四人人錢三千五百四品已上加一人每嵗内賜春服物三十匹暑服三十匹綿七屯寒食節料物三十匹酒飴杏酪粥屑肉餤清明火二社蒸􅠑端午衣一副金花銀器一事百索一軸青團鏤竹大扇一柄角糭三服粆蜜重陽酒糖粉餻冬至嵗酒兔野雞其餘時果新茗𤓰新厯是為經制直日就班授下直就第賜之凡内宴坐次宰相坐居一品班之上别賜酒食珍果與宰相同賜帛二十匹金花銀器一事貞元四年敇晦日上已重陽三節百寮宴樂翰林學士每節賜錢一百千其日奏選勝而㑹賜酒脯茶果明年廢晦日置中和節宴樂如之非凶年旱嵗兵革則毎嵗為常凡正冬至不受朝俱入進名奉賀大忌進名奉慰其日尚食供素饌賜茶十串凡郊廟大禮乘輿行幸皆設幕次于御幄之側侍從親近人臣第一御含元殿丹鳳樓則二人于宮中乘馬引駕出殿門徐出就班大慶賀則俱出就班凡當直之次自給舍丞郎入者三直無儤自起居御史郎官入五直一儤其餘雜入者十直三儤新遷官一直報儤名於次之中減半著為别條例題于北壁之西閣凡交直候内朝之退不過辰巳入者先之出者後之直者疎數視人之衆寡事之勞逸隨時之動靜凡節國忌授衣二分旬假之令不霑有不時而集併夜而宿者或内務不至外喧已寂可以探窮理性養洁然之氣故前輩傳楞伽經一本函在屋壁每下直出門相謔謂之小三昧出銀臺乘馬謂之大三昧如釋氏之去纒縳而自在也北㕔前階花塼道冬中日及五塼為入直之候李程性懶好晩入恒過八塼乃至衆呼為八塼學士元和已後院長一人别敇承㫖或密受顧問獨召對敭居北壁之東閤號為承㫖閤子其屋棟别列名焉故事駕在大内即于明福門置院駕在興慶宮則于金明門内置院今在銀臺門之北第一門向闕牓曰翰林之門其制高大重複號為胡門入門直西為學士院即開元十六年所置也引鈴于外惟宣事入其北門為翰林院又北為少陽院東屋三院西廂之結麟樓南西並禁軍署有高品使二人知院事毎日晩執事於思政殿退而傳㫖小使衣緑黄青者逮至十人更番守曹南㕔五間本學士駙馬都尉張垍飾為公主堂今東西間前架高品使居之中架為藏書南庫西三間前架中三洞各設榻受制㫖印書詔二時㑹食之所四壁列制敇條例名數其中使置博局一印櫃中間為北一戸架東西各二間學士居壁之出北門横屋六間當北㕔通廊東西二間為藏書北庫其二庫書各有録約八千卷小使主之西三間書官居之號曰待制北㕔五間東一間是承㫖閤子並學士雜處之題記名氏存于壁者自呂向始建中已後年月遷換乃為周悉南北二㕔皆有懸鈴以示呼召前庭之南横屋七間小使居之分主案牘詔草紙筆之類又西南為高品使之馬廏北為竇庫之北小板廊扺於北㕔㕔西舍之南其一門待詔戴小平嘗處其中死而復生因敞為南向之宇畫山水樹石號為畫堂次二間貯逺嵗詔草及制舉詞䇿又北迴而東並待詔居之又東盡于東垣為典主堂待詔之職執筆硯以俟書冩多至五六員其選以能不以地故未嘗用士人自王伾得志優給頗厚率三嵗一轉官有至四品登朝者虛廊曲壁多畫怪石松鶴北㕔之西南小樓王涯率人為之院内古槐松玉蘂藥樹柿子木𤓰菴羅峘山桃李杏櫻桃紫薔薇辛夷蒲萄冬青玫瑰凌霄牡丹山丹芍藥石竹紫花蕪菁青菊當陸茂葵萱草紫苑署學士至者雜植其間殆至繁隘元和十二年肇自監察御史入明年四月改左補闕依舊職守中書舍人張仲素祠部郎中知制誥段文昌司勲員外郎杜元頴司門員外郎沈傳師在焉是時睿聖文武皇帝裂海岱十二州為三道之嵗時以居翰苑皆謂凌玉清遡紫霄豈止於登瀛洲哉亦曰登玉署玉堂焉翰林志
