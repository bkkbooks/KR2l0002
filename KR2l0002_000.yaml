body:
  text: 翰林志職官類一官制之屬提要臣等謹案翰林志一卷唐李肇撰案肇所作國史補結銜題尚書左司郎中此書結銜則題翰林學士左補闕王定保摭言又稱肇為元和中中書舎人新唐書藝文志亦云肇為翰林學士坐薦柏耆自中書舍人左遷將作少監以唐官制考之葢自左司改補闕入翰林後為中書舎人坐事左遷國史補及此書各題其作書時官也唐時翰林院在銀臺門内麟徳殿西重廊之後為待詔之所新唐書百官志謂乗輿所在必有文詞經學之士下至卜醫伎術之流皆直于别院以備燕見者是也韋執誼翰林院故事亦謂其地乃天下以藝能伎術見召者之所處葢其始本以延引雜流原非為文學侍從而設至明皇置翰林待詔供奉輿集院學士分掌制誥其職始重後又改為學士别置學士院謂之東翰林院于是舊翰林院雖尚有以伎能入直如徳宗時術士桑道茂之類而翰林之名實盡歸于學士院厯代相沿遂為儒臣定職肇此書成于元和十四年唐宋藝文志皆著于録其記載賅備本末粲然于一代詞臣職掌最為詳晰宋洪遵輯翰苑羣書已全收入今以言翰林典故者莫古于是書故仍録専本以存其朔焉乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:0853c7f9fe2ee149ca3138eec0243768b19b00b84fe2e7fa5004714dfc359f92
